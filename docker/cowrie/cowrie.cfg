[honeypot]

# ── Identity (looks like a real prod server) ──────────────────────────────────
hostname = prod-api-server-01
log_path = var/log/cowrie
download_path = ${honeypot:state_path}/downloads
share_path = share/cowrie
state_path = var/lib/cowrie
etc_path = etc
contents_path = honeyfs
txtcmds_path = share/cowrie/txtcmds
ttylog = true
ttylog_path = ${honeypot:state_path}/tty

# ── Fake kernel / OS fingerprint ─────────────────────────────────────────────
kernel_version = 5.15.0-88-generic
kernel_build_string = #98-Ubuntu SMP Mon Oct 2 15:18:56 UTC 2023
hardware_platform = x86_64
operating_system = GNU/Linux

# ── Realistic fake filesystem paths ──────────────────────────────────────────
filesystem_file = share/cowrie/fs.pickle

# ── Interaction settings ──────────────────────────────────────────────────────
# Slow down commands slightly (mimics a loaded server — buys time to log)
interact_timeout = 180
authentication_timeout = 120

# ── SSH ───────────────────────────────────────────────────────────────────────
[ssh]
listen_endpoints = tcp:2222:interface=0.0.0.0
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6

# ── Telnet ────────────────────────────────────────────────────────────────────
[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

# ── Output plugins ────────────────────────────────────────────────────────────
[output_jsonlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.json

[output_textlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.log

# ── Credentials: accept common weak passwords (attacker must "succeed" to enter)
# Defined in userdb.txt — Cowrie accepts these for all users
